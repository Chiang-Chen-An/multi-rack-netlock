name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "control_plane/**"
      - "p4/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/unit-tests.yaml"
  pull_request:
    branches: [main]
    paths:
      - "control_plane/**"
      - "p4/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/unit-tests.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python3 -m pip install scapy

      - name: Run unit tests
        run: make test
